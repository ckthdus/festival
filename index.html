<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부스 웨이팅 접수</title>
  <!-- Supabase 라이브러리 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f9f9f9; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; font-size: 14px; margin-bottom: 30px; }
    label { display: block; text-align: left; margin: 15px 0 5px; font-weight: bold; color: #444; }
    input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
    button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; margin-top: 25px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎪 부스 대기 등록</h1>
  <p>차례가 되면 입력하신 번호로 안내해 드립니다.</p>
  
  <label>팀명 / 대표자 성함</label>
  <input type="text" id="cust-name" placeholder="예: 홍길동 (3명)">
  
  <label>전화번호 (숫자만)</label>
  <input type="tel" id="cust-phone" placeholder="01012345678">
  
  <button onclick="registerWaiting()">대기 등록하기</button>
</div>

<script>
  const SUPABASE_URL = 'https://cdcgcnynofdjwsghrofs.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkY2djbnlub2ZkandzZ2hyb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU2MjgsImV4cCI6MjA5OTM3MTYyOH0.i8_P851D5tGaCggBLzygEDWxYDIaeF4J4Qti4ZmD_vM';
  
  // 외부 라이브러리와 이름이 겹치지 않도록 안전하게 대문자로 결합합니다.
  const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function registerWaiting() {
    const name = document.getElementById('cust-name').value.trim();
    const phone = document.getElementById('cust-phone').value.trim();

    if (!name || !phone) {
      alert("정보를 모두 입력해 주세요!");
      return;
    }

    try {
      const { error } = await mySupabase
        .from('waiting')
        .insert([{ name: name, phone: phone, status: '대기중' }]);

      if (error) {
        alert("접수 실패: " + error.message);
      } else {
        alert("🎉 접수가 완료되었습니다! 맛있게 즐기면서 잠시만 기다려주세요.");
        document.getElementById('cust-name').value = "";
        document.getElementById('cust-phone').value = "";
      }
    } catch (err) {
      alert("오류가 발생했습니다: " + err.message);
    }
  }
</script>

</body>
</html>
