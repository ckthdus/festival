<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부스 대기 등록</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; text-align: center; }
    .container { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; font-size: 14px; margin-bottom: 25px; }
    .form-group { text-align: left; margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; font-size: 14px; }
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .btn-submit { width: 100%; background-color: #007bff; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
    .btn-submit:hover { background-color: #0056b3; }
  </style>
</head>
<body>

<div class="container">
  <h1>📝 부스 웨이팅 등록</h1>
  <p>팀명(이름)과 연락처를 남겨주시면 순서가 되었을 때 문자를 보내드립니다.</p>
  
  <div class="form-group">
    <label for="user-name">팀명 또는 이름</label>
    <input type="text" id="user-name" placeholder="예: 홍길동 (또는 팀명)">
  </div>
  
  <div class="form-group">
    <label for="user-phone">전화번호</label>
    <input type="tel" id="user-phone" placeholder="예: 01012345678 (숫자만)">
  </div>
  
  <button class="btn-submit" onclick="registerWaiting()">대기 등록하기</button>
</div>

<script>
  // 공백 오타 차단을 위해 trim()을 무조건 먹였습니다.
  const SUPABASE_URL = 'https://cdcgcnynofdjwsghrofs.supabase.co'.trim();
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkY2djbnlub2ZkandzZ2hyb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU2MjgsImV4cCI6MjA5OTM3MTYyOH0.i8_P851D5tGaCggBLzygEDWxYDIaeF4J4Qti4ZmD_vM';
  
  const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function registerWaiting() {
    const nameInput = document.getElementById('user-name').value.trim();
    const phoneInput = document.getElementById('user-phone').value.trim();

    if (!nameInput || !phoneInput) {
      alert('이름과 전화번호를 모두 입력해주세요!');
      return;
    }

    try {
      // 대기 접수 시 상태를 '대기중'으로 확실하게 명시하여 Supabase 테이블에 강제 삽입합니다.
      const { data, error } = await mySupabase
        .from('waiting')
        .insert([
          { name: nameInput, phone: phoneInput, status: '대기중' }
        ]);

      if (error) {
        alert('등록 실패: ' + error.message);
        return;
      }

      alert('🎉 대기 등록이 정상적으로 완료되었습니다! 차례가 되면 문자를 드릴테니 축제를 즐기다 와주세요.');
      
      // 입력창 초기화
      document.getElementById('user-name').value = '';
      document.getElementById('user-phone').value = '';

    } catch (err) {
      alert('오류가 발생했습니다: ' + err.message);
    }
  }
</script>
</body>
</html>
