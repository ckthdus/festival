<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자 호출 페이지</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { padding: 15px 20px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>관리자 대기 명단</h1>
  <div id="list"></div>

  <script>
    const SUPABASE_URL = 'https://cdcgcnynofdjwsghrofs.supabase.co'.trim();
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkY2djbnlub2ZkandzZ2hyb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU0OTUzMDksImV4cCI6MjAzMTA3MTMwOX0.b_publishable_8snDdawnTU1w5fbkeLnlBA_sF2BJFQM'.trim();
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
      const { data } = await supabase.from('waiting').select('*');
      const listDiv = document.getElementById('list');
      listDiv.innerHTML = '';
      data.forEach(item => {
        const div = document.createElement('div');
        div.innerHTML = `${item.name} (${item.phone}) <button onclick="triggerSMS('${item.phone}', '${item.name}', ${item.id})">호출하기</button>`;
        listDiv.appendChild(div);
      });
    }

    // 호출 버튼 누르면 무조건 실행되는 함수
    async function triggerSMS(phone, name, id) {
      // 1. 먼저 DB 상태 업데이트
      await supabase.from('waiting').update({ status: '호출완료' }).eq('id', id);
      
      // 2. 문자 앱 호출 (강제 방식)
      const cleanPhone = phone.replace(/[^0-9]/g, '');
      const msg = encodeURIComponent(`[부스알림] ${name}님, 입장해주세요!`);
      
      // 3. 실행 확인을 위한 경고창 (반응 있는지 확인)
      alert("문자 앱을 엽니다.");
      
      // 기기에 따라 처리
      const url = `sms:${cleanPhone}?body=${msg}`;
      window.location.href = url;
      
      loadData();
    }
    window.onload = loadData;
  </script>
</body>
</html>
