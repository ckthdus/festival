<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동아리원 전용 관리자 페이지</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f5f5f5; text-align: center; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #333; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
    th { background-color: #007bff; color: white; }
    .btn-call { background-color: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-cancel { background-color: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .status-waiting { background-color: #ffeeba; color: #856404; }
    .status-called { background-color: #d4edda; color: #155724; }
    .refresh-btn { background-color: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="container">
  <h1>👑 실시간 대기 명단 관리 (최종 패치)</h1>
  <button class="refresh-btn" onclick="fetchWaitingList()">🔄 명단 새로고침</button>
  
  <table>
    <thead>
      <tr>
        <th>번호</th>
        <th>팀명/이름</th>
        <th>전화번호</th>
        <th>상태</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody id="waiting-tbody">
      <tr>
        <td colspan="5">데이터를 불러오는 중입니다...</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  // 손님용 코드와 완전히 동일한 주소와 키 세팅입니다.
  const SUPABASE_URL = 'https://cdcgcnynofdjwsghrofs.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkY2djbnlub2ZkandzZ2hyb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU0OTUzMDksImV4cCI6MjAzMTA3MTMwOX0.b_publishable_8snDdawnTU1w5fbkeLnlBA_sF2BJFQM';
  
  const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function fetchWaitingList() {
    try {
      const { data, error } = await mySupabase
        .from('waiting')
        .select('*')
        .order('id', { ascending: true });

      if (error) {
        alert("명단 로드 실패: " + error.message);
        return;
      }

      const tbody = document.getElementById('waiting-tbody');
      tbody.innerHTML = '';

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">현재 대기 중인 팀이 없습니다.</td></tr>';
        return;
      }

      data.forEach((item, index) => {
        const tr = document.createElement('tr');
        let statusClass = 'status-waiting';
        if (item.status === '호출완료') statusClass = 'status-called';

        tr.innerHTML = `
          <td>${index + 1}</td>
          <td><strong>${item.name}</strong></td>
          <td>${item.phone}</td>
          <td><span class="status-badge ${statusClass}">${item.status}</span></td>
          <td>
            ${item.status !== '호출완료' ? `<button class="btn-call" onclick="callTeam(${item.id})">호출</button>` : ''}
            <button class="btn-cancel" onclick="deleteTeam(${item.id})">삭제</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } catch (err) {
      alert("오류가 발생했습니다: " + err.message);
    }
  }

  async function callTeam(id) {
    try {
      const { error } = await mySupabase.from('waiting').update({ status: '호출완료' }).eq('id', id);
      if (error) alert("호출 실패: " + error.message);
      else fetchWaitingList();
    } catch (err) { alert("오류: " + err.message); }
  }

  async function deleteTeam(id) {
    if (!confirm("정말 명단에서 삭제하시겠습니까?")) return;
    try {
      const { error } = await mySupabase.from('waiting').delete().eq('id', id);
      if (error) alert("삭제 실패: " + error.message);
      else fetchWaitingList();
    } catch (err) { alert("오류: " + err.message); }
  }

  window.onload = fetchWaitingList;
</script>
</body>
</html>
