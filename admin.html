<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>관리자 호출</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
  <style>
    body { font-family: sans-serif; padding: 15px; background-color: #f0f2f5; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 22px; margin: 0; }
    .item { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .info { font-size: 20px; margin-bottom: 15px; line-height: 1.4; }
    button { width: 100%; padding: 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; }
    .btn-call { background-color: #28a745; color: white; }
    .btn-refresh { background-color: #007bff; color: white; width: auto; padding: 12px 18px; font-size: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>대기 명단</h1>
    <button class="btn-refresh" onclick="loadData()">새로고침</button>
  </div>
  <div id="list">데이터를 불러오는 중...</div>

  <script>
    const SUPABASE_URL = 'https://cdcgcnynofdjwsghrofs.supabase.co'.trim();
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkY2djbnlub2ZkandzZ2hyb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU2MjgsImV4cCI6MjA5OTM3MTYyOH0.i8_P851D5tGaCggBLzygEDWxYDIaeF4J4Qti4ZmD_vM';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
      const { data } = await supabase.from('waiting').select('*').order('id', { ascending: true });
      const listDiv = document.getElementById('list');
      listDiv.innerHTML = '';
      
      if (!data || data.length === 0) {
        listDiv.innerHTML = '<div class="item" style="text-align:center;">대기 팀 없음</div>';
        return;
      }

      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="info"><strong>팀명: ${item.name}</strong><br>번호: ${item.phone}</div>
          <button class="btn-call" onclick="callAndRemove(${item.id}, '${item.phone}', '${item.name}')">📞 호출 후 삭제</button>
        `;
        listDiv.appendChild(div);
      });
    }

    async function callAndRemove(id, phone, name) {
      const cleanPhone = phone.replace(/[^0-9]/g, '');
      window.location.href = `sms:${cleanPhone}?body=${encodeURIComponent('[부스알림] 입장 순서가 되었습니다!')}`;
      await supabase.from('waiting').delete().eq('id', id);
      loadData();
    }

    window.onload = loadData;
  </script>
</body>
</html>
