<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👑 동아리원 전용 관리자창</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
    h2 { text-align: center; color: #333; margin-bottom: 15px; }
    .refresh-box { text-align: right; margin-bottom: 10px; }
    .btn-refresh { padding: 8px 16px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .info { font-size: 15px; }
    .info strong { font-size: 18px; color: #007BFF; }
    .status { font-weight: bold; display: inline-block; margin-top: 4px; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .status-wait { background: #e3f2fd; color: #0d47a1; }
    .status-call { background: #fff3e0; color: #e65100; }
    .actions { display: flex; gap: 8px; }
    .btn-call { background-color: #28a745; color: white; border: none; padding: 12px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-enter { background-color: #dc3545; color: white; border: none; padding: 12px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </main>
</head>
<body>

  <h2>👑 실시간 대기 명단</h2>
  <div class="refresh-box">
    <button class="btn-refresh" onclick="loadWaitingList()">🔄 새로고침</button>
  </div>

  <div id="waiting-cards"></div>

  <script>
    // ⚠️ 본인의 Supabase 정보로 꼭 변경하세요!
    const SUPABASE_URL = 'https://cdcgcnynofdjwsghrofs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkY2djbnlub2ZkandzZ2hyb2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3OTU2MjgsImV4cCI6MjA5OTM3MTYyOH0.i8_P851D5tGaCggBLzygEDWxYDIaeF4J4Qti4ZmD_vM';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 대기 목록 불러오기 (입장완료 제외)
    async function loadWaitingList() {
      const container = document.getElementById('waiting-cards');
      container.innerHTML = '<p style="text-align:center; color:#999;">업데이트 중...</p>';

      const { data: list, error } = await supabase
        .from('waiting')
        .select('*')
        .neq('status', '입장완료')
        .order('id', { ascending: true });

      if (error) return alert("데이터 로드 실패");

      container.innerHTML = '';
      if(list.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">현재 대기 팀이 없습니다.</p>';
        return;
      }

      list.forEach(team => {
        const card = document.createElement('div');
        card.className = 'card';
        const isCalled = team.status === '호출됨';

        card.innerHTML = `
          <div class="info">
            <strong>${team.id}번</strong> | ${team.name}<br>
            <span style="font-size:13px; color:#666;">${team.phone}</span><br>
            <span class="status ${isCalled ? 'status-call' : 'status-wait'}">${team.status}</span>
          </div>
          <div class="actions">
            <button class="btn-call" onclick="callCustomer(${team.id}, '${team.phone}', '${team.name}')">📢 호출</button>
            <button class="btn-enter" onclick="enterCustomer(${team.id})">✅ 입장</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // 📢 호출 버튼 (상태 업데이트 + 가상 문자 발송)
    async function callCustomer(id, phone, name) {
      const { error } = await supabase
        .from('waiting')
        .update({ status: '호출됨' })
        .eq('id', id);

      if (error) return alert("호출 실패");
      
      // 기기 자체 팝업 알림 (하루용 축제 스택이므로 비용이 들지 않는 가장 안전한 방식)
      alert(`[문자 발송 알림]\n수신: ${phone}\n"안녕하세요, ${name}님! 차례가 되었습니다. 지금 바로 동아리 부스로 입장해 주세요!"`);
      loadWaitingList();
    }

    // ✅ 입장 버튼 (누르면 목록에서 즉시 삭제)
    async function enterCustomer(id) {
      if(!confirm("입장 처리하고 대기줄에서 제외하시겠습니까?")) return;

      const { error } = await supabase
        .from('waiting')
        .update({ status: '입장완료' })
        .eq('id', id);

      if (error) return alert("입장 처리 실패");
      
      loadWaitingList();
    }

    // 초기 실행
    loadWaitingList();
  </script>
</body>
</html>
